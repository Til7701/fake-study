name: Maven Verify

on: push

jobs:
  test:
    name: Verify with Maven
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Set up JDK 25
        uses: actions/setup-java@v5.2.0
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven
      - name: Test with Maven
        run: mvn verify --batch-mode
